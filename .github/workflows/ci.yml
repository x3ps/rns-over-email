name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9.2.0

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v7.0.0
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./cmd/rns-over-email

  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - run: docker compose -f example/docker-compose.yml config --quiet
      - uses: docker/setup-buildx-action@v3.14.0
      - uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: example/Dockerfile.node
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
